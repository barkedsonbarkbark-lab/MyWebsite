<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title or "Maks Terminal" }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  {% if content and content.custom_css %}
    <style>{{ content.custom_css|safe }}</style>
  {% endif %}
</head>
<body>
  <div class="screen-glow"></div>
  <div class="scanlines"></div>
  {% block body %}{% endblock %}
</body>
</html>
